name: uv compile + dry-run

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  compile-cpu:
    runs-on: ubuntu-latest
    name: compile + dry-run (cpu)
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install uv
        run: python -m pip install --upgrade pip && pip install uv
      - name: Run uv compile (CPU backend) and dry-run sync
        run: |
          UV_TORCH_BACKEND=cpu uv pip compile requirements.txt --format pylock.toml -o pylock.toml
          uv pip sync pylock.toml --dry-run --torch-backend cpu --python $(which python)
          # Verify compiled lock contains cpu wheels for torch and torchvision
          if ! grep -E "name = \"torch\"" -n pylock.toml >/dev/null 2>&1; then
            echo "pylock.toml missing torch entry"; exit 1
          fi
          if ! grep -E "\+cpu" -n pylock.toml >/dev/null 2>&1; then
            echo "pylock.toml does not contain any +cpu tagged wheels; expected cpu backend"; exit 1
          fi
        env:
          UV_FORCE_COLOR: 1

  compile-auto:
    runs-on: ubuntu-latest
    name: compile + dry-run (auto / simulated GPU)
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install uv
        run: python -m pip install --upgrade pip && pip install uv
      - name: Run uv compile (auto) and dry-run sync
        run: |
          # Simulate auto backend (would choose appropriate wheels on real GPU hosts)
          UV_TORCH_BACKEND=auto uv pip compile requirements.txt --format pylock.toml -o pylock.toml
          uv pip sync pylock.toml --dry-run --torch-backend auto --python $(which python)
        env:
          UV_FORCE_COLOR: 1
